<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Threat Model Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 2rem; }
    .container { max-width: 600px; margin: 0 auto; }
    .header { background: #1a1a2e; color: white; padding: 2rem; border-radius: 8px; margin-bottom: 2rem; }
    .header h1 { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
    .header p { font-size: 13px; opacity: 0.7; }
    .card { background: white; border-radius: 8px; padding: 1.5rem; border: 0.5px solid #e0e0e0; margin-bottom: 1rem; }
    .field { margin-bottom: 1.25rem; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #1a1a1a; }
    input[type="text"] { width: 100%; padding: 8px 12px; border: 0.5px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
    input[type="text"]:focus { border-color: #3b5bdb; }
    .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .checkbox-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 0.5px solid #e0e0e0; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .checkbox-item:hover { background: #f8f8f8; }
    .checkbox-item input { margin: 0; }
    select { width: 100%; padding: 8px 12px; border: 0.5px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; background: white; }
    .btn { width: 100%; padding: 10px; background: #1a1a2e; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn:hover { background: #2d2d4e; }
    .error { background: #fdecea; color: #c0392b; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 1rem; border-left: 3px solid #c0392b; }
    .section-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: #999; margin-bottom: 8px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Threat Model Generator</h1>
    <p>STRIDE + MITRE ATT&CK mapping for your system components</p>
  </div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form action="/generate" method="POST">
    <div class="card">
      <div class="field">
        <label>System Name</label>
        <input type="text" name="system_name" placeholder="e.g. Customer Payment Portal" required />
      </div>

      <div class="field">
        <div class="section-label">Select Components</div>
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" name="components" value="web_app" /> Web Application
          </label>
          <label class="checkbox-item">
            <input type="checkbox" name="components" value="api" /> REST API
          </label>
          <label class="checkbox-item">
            <input type="checkbox" name="components" value="database" /> Database
          </label>
          <label class="checkbox-item">
            <input type="checkbox" name="components" value="auth" /> Authentication
          </label>
        </div>
      </div>

      <div class="field">
        <label>Data Sensitivity</label>
        <select name="data_sensitivity">
          <option value="low">Low — Public data</option>
          <option value="medium" selected>Medium — Internal data</option>
          <option value="high">High — PII / Financial / Health data</option>
        </select>
      </div>

      <button type="submit" class="btn">Generate Threat Model</button>
    </div>
  </form>
</div>
</body>
</html>
